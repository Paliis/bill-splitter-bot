# https://render.com/docs/blueprint-spec
# Worker: BOT_TOKEN + DATABASE_URL. Web (API): DATABASE_URL + API_SECRET; BOT_TOKEN не потрібен.

services:
  - type: worker
    name: bill-splitter-bot
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPPORT_MONO_URL
        sync: false
      - key: SUPPORT_BUYMEACOFFEE_URL
        sync: false
      - key: SUPPORT_FEEDBACK_URL
        sync: false

  - type: web
    name: bill-splitter-api
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_SECRET
        sync: false

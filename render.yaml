# https://render.com/docs/blueprint-spec
# У дашборді Render задай значення: BOT_TOKEN, DATABASE_URL; опційно SUPPORT_MONO_URL.

services:
  - type: worker
    name: bill-splitter-bot
    runtime: python
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPPORT_MONO_URL
        sync: false
